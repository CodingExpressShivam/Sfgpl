<!DOCTYPE html>
<html>
<head>
  <title>Gatepass Entry</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      padding: 25px;
      width: 400px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row div {
      flex: 1;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Gatepass Entry</h2>

  <form id="form">

    <div class="row">
      <div><input type="date" id="date" required></div>
      <div><input type="time" id="time" required></div>
    </div>

    <input type="text" id="challan" placeholder="Challan No" required>
    <input type="text" id="item" placeholder="Item Description" required>

    <div class="row">
      <div><input type="number" id="quantity" placeholder="Quantity" required></div>
      <div><input type="number" id="amount" placeholder="Amount" required></div>
    </div>

    <select id="unit">
      <option>Nos</option>
      <option>PKT</option>
      <option>Bags</option>
    </select>

    <input type="text" id="vehicle" placeholder="Vehicle Number">
    <input type="text" id="driver" placeholder="Driver Name">
    <input type="text" id="location" placeholder="Location">

    <button type="submit">Submit</button>
  </form>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwjVZ6A3z9nzaOfHoMJthcN_1O3dooZCv807nlgiZJaMYurEGducaImRj4TZMlolz3_uA/exec";

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const data = {
    date: document.getElementById("date").value,
    time: document.getElementById("time").value,
    challan: document.getElementById("challan").value,
    item: document.getElementById("item").value,
    quantity: document.getElementById("quantity").value,
    amount: document.getElementById("amount").value,
    unit: document.getElementById("unit").value,
    vehicle: document.getElementById("vehicle").value,
    driver: document.getElementById("driver").value,
    location: document.getElementById("location").value
  };

  fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(data)
  });

  alert("✅ Data Saved to Google Sheet");
  document.getElementById("form").reset();
});
</script>

</body>
</html>
